<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <title>Oráculo Cavalcante</title>
  <style>
    body {
      font-family: Arial, sans-serif;
      background: #111;
      color: #eee;
      margin: 0;
      padding: 0;
    }
    #chat {
      max-width: 600px;
      margin: 50px auto;
      background: #222;
      padding: 20px;
      border-radius: 8px;
    }
    .linha {
      margin: 10px 0;
      padding: 10px;
      border-radius: 5px;
    }
    .user {
      background: #444;
      text-align: right;
    }
    .bot {
      background: #333;
      text-align: left;
    }
    #entrada {
      width: 80%;
      padding: 10px;
      border: none;
      border-radius: 5px;
    }
    #enviar {
      padding: 10px 20px;
      border: none;
      border-radius: 5px;
      background: #555;
      color: #eee;
      cursor: pointer;
    }
    #enviar:hover {
      background: #666;
    }
  </style>
</head>
<body>
  <div id="chat">
    <div id="mensagens"></div>
    <input id="entrada" type="text" placeholder="Digite sua pergunta...">
    <button id="enviar">Enviar</button>
  </div>

  <script>
    const mensagens = document.getElementById('mensagens');
    const entrada = document.getElementById('entrada');
    const enviar = document.getElementById('enviar');

    function criarLinhaTexto(texto, classe) {
      const div = document.createElement('div');
      div.className = 'linha ' + classe;
      div.textContent = texto;
      mensagens.appendChild(div);
      mensagens.scrollTop = mensagens.scrollHeight;
    }

    async function enviarPergunta() {
      const query = entrada.value.trim();
      if (!query) return;
      criarLinhaTexto(query, 'user');
      entrada.value = '';

      try {
        const res = await fetch("/api/groq?pergunta=" + encodeURIComponent(query));
        const data = await res.json();
        criarLinhaTexto(data.answer, 'bot');
      } catch (error) {
        criarLinhaTexto("Erro ao consultar o Oráculo.", 'bot');
      }
    }

    enviar.addEventListener('click', enviarPergunta);
    entrada.addEventListener('keypress', function(e) {
      if (e.key === 'Enter') enviarPergunta();
    });
  </script>
</body>
</html>
